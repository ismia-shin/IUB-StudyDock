<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Study Dock</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="icon" type="image/png" href="/Asset/study_dock.png">
</head>

<body>

    <header>

        <div id="logo">
            <img src="/Asset/study_dock.png" height="40">
            <a href="/Home/homepage.html">
                <h1>Study Dock</h1>
            </a>
        </div>

        <nav>
            <ul>
                <li><a href="/Student/course_dashboard.html">Course Dashboard</a></li>
                <li><a href="/Student/recommendation.html">Recommendation</a></li>
                <li><a href="/Student/progress.html">Progess</a></li>
                <li><a href="/Student/profile.html">Profile</a></li>
            </ul>
        </nav>
    </header>

    <main>
    <div class="profile-header">
        <img src="/Asset/profile_image.jpg" alt="Profile Pic" class="main-profile-pic">
        <h1 id="name">John Wick</h1>
    </div>

    <div class="profile-card">
        <div class="profile-row">
            <span class="label">First Name:</span>
            <span class="value" id="first_name">John</span>
            <button class="edit-btn" id="first_name_btn"><img src="/Asset/edit.png" alt="Edit"></button>
        </div>

        <div class="profile-row">
            <span class="label">Last Name:</span>
            <span class="value" id="last_name">Wick</span>
            <button class="edit-btn" id="last_name_btn"><img src="/Asset/edit.png" alt="Edit"></button>
        </div>

        <div class="profile-row">
            <span class="label">Date of Birth:</span>
            <span class="value">30/12/2006</span>
            </div>

        <div class="profile-row">
            <span class="label">Address:</span>
            <span class="value" id="address">Mirpur 1</span>
            <button class="edit-btn" id="address_btn"><img src="/Asset/edit.png" alt="Edit"></button>
        </div>

        <div class="profile-row">
            <span class="label">Major:</span>
            <span class="value">Computer Science</span>
        </div>
    </div>
</main>

<script src="profile.js"></script>

</body>

</html>
