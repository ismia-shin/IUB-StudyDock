<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Study Dock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../Asset/study_dock.png">
</head>

<body>

    <header>

        <div id="logo">
            <img src="../Asset/study_dock.png" height="40">
            <a href="../Home/homepage.html">
                <h1>Study Dock</h1>
            </a>
        </div>

        <nav>
            <ul>
                <li><a href="../Admin/manage_profile.html">Manage Profile</a></li>
                <li><a href="../Admin/course.html">Course Dashboard</a></li>
                <li><a href="../Admin/content.html">Manage Content</a></li>
                <li><a href="../Admin/profile.html">Profile</a></li>
            </ul>
        </nav>
    </header>


    <main>
        
        <div class="search-container">
        <input type="search" placeholder="Search for Course..." id="search">
        </div>

        <h2>Student Profile</h2>

        <button id="addNewCourseBtn">Add new</button>
        
        <table class="table">
            <thead>
                <tr>
                    <th>CourseID</th>
                    <th>Course Name</th>
                    <th>Instructor</th>
                    <th>Credit</th>
                    <th>Link</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>CSE306</td>
                    <td>Database Management System</td>
                    <td>Noureen Islam</td>
                    <td>3</td>
                    <td><a href="../Student/course.html" class="action-link">View</a></td>
                    <td>
                        <button onclick="deleteRow(this)">Delete</button>
                        <button onclick="editCourseRow(this)">Edit</button>
                    </td>
                </tr>
                <tr>
                    <td>CSE216</td>
                    <td>Microprocessor, Interfacing and Assembly Language</td>
                    <td>Noor-E Sadman</td>
                    <td>3</td>
                    <td><a href="../Student/course.html" class="action-link">View</a></td>
                    <td>
                        <button onclick="deleteRow(this)">Delete</button>
                        <button onclick="editCourseRow(this)">Edit</button>
                    </td>
                </tr>
            </tbody>
        </table>

    </main>

    <script src="index.js"></script>
</body>
</html>
